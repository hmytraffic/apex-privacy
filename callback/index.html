  <!DOCTYPE html>                                                                                                                         
  <html>                                                                                                                                
  <head><title>Redirecting...</title></head>
  <body>
  <p>Redirecting to Apex...</p>
  <script>
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var state = params.get('state');
    if (state && code) {
      var returnUrl = decodeURIComponent(state);
      window.location.href = returnUrl + '?code=' + code;
    } else {
      window.location.href = 'apex://whoop/callback' + window.location.search;
    }
  </script>
  </body>
  </html>
